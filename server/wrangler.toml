# Cloudflare Workers 配置
# 部署：npx wrangler deploy
# 本地 Workers 模拟：npx wrangler dev

name = "syncspace-qwen-proxy"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# 非敏感变量可放 [vars]，API Key 用 wrangler secret 设置
# wrangler secret put DASHSCOPE_API_KEY

# Observability（日志）
[observability]
enabled = true
